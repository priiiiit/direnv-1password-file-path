name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run Shellcheck
        run: shellcheck op_secret_path.sh
        # Note: op_secret_path_cleanup.zsh is zsh-only, shellcheck doesn't support zsh

      - name: Get version from tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate checksums
        id: checksum
        run: |
          # Main script checksum (for direnv source_url)
          MAIN_HEX=$(shasum -a 256 op_secret_path.sh | cut -d' ' -f1)
          MAIN_BASE64=$(python3 -c "import binascii, base64; print(base64.b64encode(binascii.unhexlify('$MAIN_HEX')).decode())")
          echo "MAIN_HEX=$MAIN_HEX" >> $GITHUB_OUTPUT
          echo "MAIN_BASE64=$MAIN_BASE64" >> $GITHUB_OUTPUT
          echo "MAIN_DIRENV=sha256-$MAIN_BASE64" >> $GITHUB_OUTPUT
          
          # Cleanup script checksum
          CLEANUP_HEX=$(shasum -a 256 op_secret_path_cleanup.zsh | cut -d' ' -f1)
          CLEANUP_BASE64=$(python3 -c "import binascii, base64; print(base64.b64encode(binascii.unhexlify('$CLEANUP_HEX')).decode())")
          echo "CLEANUP_HEX=$CLEANUP_HEX" >> $GITHUB_OUTPUT
          echo "CLEANUP_BASE64=$CLEANUP_BASE64" >> $GITHUB_OUTPUT

      - name: Create checksums file
        run: |
          echo "# SHA256 Checksums" > checksums.txt
          echo "" >> checksums.txt
          shasum -a 256 op_secret_path.sh >> checksums.txt
          shasum -a 256 op_secret_path_cleanup.zsh >> checksums.txt
          echo "" >> checksums.txt
          echo "# For direnv source_url (base64 format):" >> checksums.txt
          echo "op_secret_path.sh: ${{ steps.checksum.outputs.MAIN_DIRENV }}" >> checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            op_secret_path.sh
            op_secret_path_cleanup.zsh
            checksums.txt
          body: |
            ## Release ${{ steps.tag.outputs.VERSION }}

            ### Installation (Both Required)

            **Step 1: In `~/.zshrc` (before direnv hook):**
            ```zsh
            source "path/to/op_secret_path_cleanup.zsh"
            ```

            **Step 2: In `~/.config/direnv/direnvrc`:**
            ```sh
            source_url "https://github.com/${{ github.repository }}/raw/${{ steps.tag.outputs.VERSION }}/op_secret_path.sh" "${{ steps.checksum.outputs.MAIN_DIRENV }}"
            ```

            ### Checksums

            | File | SHA256 (hex) |
            |------|--------------|
            | `op_secret_path.sh` | `${{ steps.checksum.outputs.MAIN_HEX }}` |
            | `op_secret_path_cleanup.zsh` | `${{ steps.checksum.outputs.CLEANUP_HEX }}` |

            **direnv source_url format:**
            ```
            ${{ steps.checksum.outputs.MAIN_DIRENV }}
            ```
          draft: false
          prerelease: false
