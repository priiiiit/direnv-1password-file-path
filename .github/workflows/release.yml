name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v1.0.1, etc.

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Install Shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run Shellcheck
        run: shellcheck op_secret_path.sh

      - name: Get version from tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          SHA256_HEX=$(shasum -a 256 op_secret_path.sh | cut -d' ' -f1)
          # Convert hex to base64 using Python (more portable than xxd)
          SHA256_BASE64=$(python3 -c "import binascii, base64; print(base64.b64encode(binascii.unhexlify('$SHA256_HEX')).decode())")
          echo "SHA256_HEX=$SHA256_HEX" >> $GITHUB_OUTPUT
          echo "SHA256_BASE64=$SHA256_BASE64" >> $GITHUB_OUTPUT
          echo "SHA256_DIRENV=sha256-$SHA256_BASE64" >> $GITHUB_OUTPUT
          echo "Generated SHA256 (hex): $SHA256_HEX"
          echo "Generated SHA256 (base64): $SHA256_BASE64"
          echo "direnv format: sha256-$SHA256_BASE64"

      - name: Create checksums file
        run: |
          shasum -a 256 op_secret_path.sh > checksums.txt
          echo "" >> checksums.txt
          echo "SHA256 (hex): ${{ steps.checksum.outputs.SHA256_HEX }}" >> checksums.txt
          echo "SHA256 (base64): ${{ steps.checksum.outputs.SHA256_BASE64 }}" >> checksums.txt
          echo "" >> checksums.txt
          echo "For direnv source_url usage:" >> checksums.txt
          echo "${{ steps.checksum.outputs.SHA256_DIRENV }}" >> checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            op_secret_path.sh
            checksums.txt
          body: |
            ## Release ${{ steps.tag.outputs.VERSION }}

            ### Installation

            **Using direnv `source_url`:**

            ```sh
            source_url "https://github.com/${{ github.repository }}/raw/${{ steps.tag.outputs.VERSION }}/op_secret_path.sh" "${{ steps.checksum.outputs.SHA256_DIRENV }}"
            ```

            **SHA256 Checksum (hex):**
            ```
            ${{ steps.checksum.outputs.SHA256_HEX }}
            ```

            **SHA256 Checksum (base64):**
            ```
            ${{ steps.checksum.outputs.SHA256_BASE64 }}
            ```

            **direnv source_url format:**
            ```
            ${{ steps.checksum.outputs.SHA256_DIRENV }}
            ```

            ### Changes

            See the [full changelog](https://github.com/${{ github.repository }}/compare/${{ steps.tag.outputs.VERSION }}^...${{ steps.tag.outputs.VERSION }}).
          draft: false
          prerelease: false
