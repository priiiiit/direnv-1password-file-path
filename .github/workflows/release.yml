name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v1.0.1, etc.

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Install Shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run Shellcheck
        run: shellcheck op_secret_path.sh

      - name: Get version from tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          SHA256_HEX=$(shasum -a 256 op_secret_path.sh | cut -d' ' -f1)
          echo "SHA256_HEX=$SHA256_HEX" >> $GITHUB_OUTPUT
          echo "Generated SHA256 (hex): $SHA256_HEX"

      - name: Create checksums file
        run: |
          shasum -a 256 op_secret_path.sh > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            op_secret_path.sh
            checksums.txt
          body: |
            ## Release ${{ steps.tag.outputs.VERSION }}

            ### Installation

            Source the script in your shell profile or download it:

            ```sh
            source "path/to/op_secret_path.sh"
            ```

            Then use it in your project's `mise.toml`:

            ```toml
            [env]
            _.source = ["env.sh"]
            ```

            **SHA256 Checksum:**
            ```
            ${{ steps.checksum.outputs.SHA256_HEX }}
            ```

            ### Changes

            See the [full changelog](https://github.com/${{ github.repository }}/compare/${{ steps.tag.outputs.VERSION }}^...${{ steps.tag.outputs.VERSION }}).
          draft: false
          prerelease: false
